name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same PR/branch when new commits land. Pushes to
# main always run to completion (no cancel) so every merged commit gets a full check.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Path filter for PRs: each lane runs only when relevant files change. On push
  # to main the `if:` bypass below runs every lane anyway (cache warming). The
  # `ci` job (alls-green) is the sole required merge gate — see ruleset note at
  # the bottom of this file.
  changes:
    runs-on: ubuntu-latest
    outputs:
      js: ${{ steps.filter.outputs.js }}
      rust: ${{ steps.filter.outputs.rust }}
      e2e: ${{ steps.filter.outputs.e2e }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            js:
              - '!src-tauri/**'
              - '!e2e/**'
              - '!e2e-native/**'
            rust:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'
            e2e:
              - 'src/**'
              - 'packages/**'
              - 'e2e/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'playwright.config.ts'
              - 'index.html'
              - '.github/workflows/ci.yml'
            native:
              - 'src/**'
              - 'src-tauri/**'
              - 'packages/**'
              - 'e2e-native/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'index.html'
              - '.github/workflows/ci.yml'

  # Web/JS lane: everything driven by pnpm — app + packages + MCP + docs build,
  # format, lint, license headers. Paired with the `rust` job (cargo lane).
  js:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      - run: pnpm run format:check
      - run: pnpm run lint
      # Fast correctness signal: pure-logic unit/integration tests. `pnpm install`
      # already ran `prepare`, so the workspace package `dist/` outputs the tests
      # resolve against are present. This step gates the PR like the others, and
      # also enforces the coverage ratchet in vitest.config.ts (`coverage.thresholds`):
      # a snapshot floor — global plus stricter per-directory globs — that fails on
      # any drop. Re-baseline it (same change) when intentionally lowering coverage.
      - run: pnpm run test:coverage
      # `tsc -b` is not run on its own here: `pnpm run build` already runs it
      # (`… && tsc -b && vite build`), so a standalone step would type-check twice.
      - run: pnpm run build:mcp
      - run: pnpm run build
      - run: pnpm run license-headers:check

      # Type-safety ratchet (rollout step 3 of #50): fail if strict type-coverage
      # of the app (tsconfig.app.json) regresses below the agreed floor (~99.7%
      # today, gated at 99%). tsc itself already runs via `pnpm run build` (tsc -b),
      # so there is no separate `tsc --noEmit` step.
      - run: pnpm run type-coverage

      # Static-analysis gates (#50 step 5). fallow's dead-code envelope also covers
      # circular dependencies and re-export cycles, so this is zero-tolerance on
      # unused code AND architecture cycles (all at 0). False positives: .fallowrc.jsonc.
      - run: pnpm run analyze:dead-code

      # Duplication and complexity: identity baselines in fallow-baselines/ freeze
      # the current backlog and fail only on NEW clones / complex functions. Lower
      # the baselines (--save-baseline) as the backlog is worked down.
      - run: pnpm run analyze:dupes
      - run: pnpm run analyze:health

  # Native layer (src-tauri/). Runs in parallel with `js`; a red Rust gate
  # blocks merge just like lint/build. See .github/workflows/release.yml for the
  # macOS bundle build — this job is the per-PR fmt/lint/compile feedback loop.
  rust:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable) with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # Formatting needs neither the frontend nor system deps — run it first so a
      # style-only failure fails fast before the heavier compile steps.
      - run: cargo fmt --all --check
        working-directory: src-tauri

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      # `tauri::generate_context!` embeds the bundle icons listed in
      # tauri.conf.json; they are gitignored and generated from the tile SVG, so
      # without this step clippy/check/test fail to compile lib.rs. The frontend
      # `dist/` is not needed for `cargo check`.
      - name: Generate desktop icons from tile SVG
        run: pnpm run icons:desktop

      # Cache the resolved .deb set instead of re-fetching ~62 MB from the Azure
      # Ubuntu mirror every run: the download is the slowest part of this job and
      # the mirror occasionally stalls for minutes on a single package. On a cache
      # hit the packages restore from the Actions cache with no network. Bump
      # `version` to invalidate the cache after changing the package list.
      - name: Install Tauri Linux system dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: >-
            libwebkit2gtk-4.1-dev
            libgtk-3-dev
            librsvg2-dev
            libayatana-appindicator3-dev
          version: 1

      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - run: cargo check --all-targets
        working-directory: src-tauri

      - run: cargo test
        working-directory: src-tauri

  # End-to-end web UI (Playwright). Covers the flows that run in a plain browser
  # (`isDesktop() === false`); the native layer (fs/dialogs/IPC/file-watch) is a
  # separate tauri-driver lane (#28 follow-up). Runs in parallel with `js`/`rust`.
  e2e:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      # Browser binary + its OS libraries. The Playwright version pins the
      # browser revision, so this is cached implicitly by the runner image layer
      # only when versions match — `--with-deps` is the portable path.
      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      # Playwright boots the Vite dev server itself (webServer in
      # playwright.config.ts) and tears it down when the run ends.
      - run: pnpm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore

  # Native-layer e2e (WebdriverIO + tauri-driver), run inside a pre-baked Docker
  # image (full WebKit runtime closure + WebKitWebDriver + xvfb + Rust +
  # tauri-driver). The image removes the slow, mirror-dependent apt install
  # entirely and is the SAME image developers run on macOS via
  # `e2e-native/run-local.sh`, so this lane is reproducible locally instead of
  # debuggable only through CI. Drives the real Tauri shell to cover what the
  # Playwright lane cannot: real fs, the file watcher (`useGraphFileWatch`), and
  # desktop-sync. Linux-only (no macOS Tauri WebDriver).
  e2e-native:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.native == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      # Build the image with a GitHub Actions layer cache — ~10 min on a cold
      # cache, ~1 min warm. Same Dockerfile as the local runner, so CI and local
      # stay byte-for-byte identical.
      - name: Build e2e-native image
        uses: docker/build-push-action@v6
        with:
          context: e2e-native
          file: e2e-native/Dockerfile
          load: true
          tags: nesso-e2e-native:ci
          cache-from: type=gha,scope=e2e-native
          cache-to: type=gha,mode=max,scope=e2e-native

      # Run the lane inside the image against the checked-out workspace. The app
      # is built (cargo, via wdio's onPrepare) and driven (WebKitWebDriver under
      # xvfb) entirely in the container; HUSKY=0 skips the git-hook install
      # `prepare` would attempt. Failure diagnostics land in e2e-native/artifacts.
      - name: Run native e2e lane
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" -w /work \
            -e CI=true -e HUSKY=0 \
            nesso-e2e-native:ci bash -lc '
              corepack enable
              pnpm install --frozen-lockfile
              xvfb-run --auto-servernum pnpm run test:e2e:native
            '

      - name: Upload native e2e diagnostics
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: e2e-native-diagnostics
          path: e2e-native/artifacts
          retention-days: 7
          if-no-files-found: ignore

  # Sole required merge gate (ruleset "main protection"). Always runs; fails when
  # any executed lane failed or when `changes` failed. Skipped lanes (path-filter
  # on PRs) are tolerated via allowed-skips — unlike a bare job-level `if:`, a
  # skipped required check would otherwise report Success and unblock merge.
  #
  # Ruleset migration (manual, repo Settings → Rules → main protection):
  #   1. Merge the PR that introduces this job so `ci` appears at least once.
  #   2. Add `ci` to required status checks.
  #   3. Remove `js`, `rust`, `e2e`, `e2e-native` from required status checks.
  ci:
    if: always()
    needs: [changes, js, rust, e2e, e2e-native]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: js, rust, e2e, e2e-native
