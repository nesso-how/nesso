name: Release

# Runs the workflow YAML from the commit that triggered the event. Re-tag from
# main after changing this file, or use workflow_dispatch on main.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-npm:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"
          # Release publishes via npm Trusted Publishing (OIDC); do not cache deps here.
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      # Auth: npm Trusted Publishing (OIDC). Configure each package on npmjs.com
      # (Package settings → Trusted Publisher → GitHub Actions: nesso-how/nesso, release.yml).
      - name: Publish packages
        run: pnpm -r --filter "./packages/**" publish --no-git-checks --provenance

  publish:
    permissions:
      contents: write
    # Single universal macOS build: one .dmg that runs on both Apple Silicon and
    # Intel, and one complete latest.json (no matrix race on the updater manifest).
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm via Corepack (uses packageManager in package.json)
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Generate desktop icons from tile SVG
        run: pnpm run icons:desktop

      - name: Release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          PREFIX="## [${VERSION}]"
          TMP=$(mktemp)
          printing=0
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" == "$PREFIX"* ]]; then
              printing=1
              printf '%s\n' "$line"
              continue
            fi
            if [[ "$printing" -eq 1 ]]; then
              if [[ "$line" == "## ["* ]]; then
                break
              fi
              if [[ "$line" =~ ^\[[^]]+\]: ]]; then
                break
              fi
              printf '%s\n' "$line"
            fi
          done < CHANGELOG.md > "$TMP"
          if [[ ! -s "$TMP" ]]; then
            printf '%s\n' "No \`## [${VERSION}]\` section found in [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/CHANGELOG.md) for this tag. Add it before releasing." > "$TMP"
          fi
          {
            echo 'body<<CHANGELOGEOF'
            cat "$TMP"
            echo CHANGELOGEOF
          } >> "$GITHUB_OUTPUT"
          rm -f "$TMP"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing keys (minisign). Configure both as repo secrets;
          # the matching public key lives in src-tauri/tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: ./src-tauri
          tagName: v__VERSION__
          releaseName: "Nesso v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: false
          # Full release (not pre-release) so releases/latest/download/latest.json
          # — the updater endpoint — resolves to this build.
          prerelease: false
          args: "--target universal-apple-darwin"
          includeUpdaterJson: true
