name: Release

# Runs the workflow YAML from the commit that triggered the event. Re-tag from
# main after changing this file, or use workflow_dispatch on main.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-npm:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'
          # Release publishes via npm Trusted Publishing (OIDC); do not cache deps here.
          package-manager-cache: false

      - name: Enable pnpm via Corepack
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - run: pnpm install --frozen-lockfile

      # Auth: npm Trusted Publishing (OIDC). Configure each package on npmjs.com
      # (Package settings → Trusted Publisher → GitHub Actions: nesso-how/nesso, release.yml).
      - name: Publish packages
        run: pnpm -r --filter "./packages/**" publish --no-git-checks --provenance

  publish:
    permissions:
      contents: write
    # Single universal macOS build: one .dmg that runs on both Apple Silicon and
    # Intel, and one complete latest.json (no matrix race on the updater manifest).
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm via Corepack (uses packageManager in package.json)
        run: corepack enable

      - name: Pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Generate desktop icons from tile SVG
        run: pnpm run icons:desktop

      - name: Release notes from CHANGELOG.md
        id: changelog
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version src-tauri/tauri.conf.json)
          PREFIX="## [${VERSION}]"
          TMP=$(mktemp)
          printing=0
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ "$line" == "$PREFIX"* ]]; then
              printing=1
              printf '%s\n' "$line"
              continue
            fi
            if [[ "$printing" -eq 1 ]]; then
              if [[ "$line" == "## ["* ]]; then
                break
              fi
              if [[ "$line" =~ ^\[[^]]+\]: ]]; then
                break
              fi
              printf '%s\n' "$line"
            fi
          done < CHANGELOG.md > "$TMP"
          if [[ ! -s "$TMP" ]]; then
            printf '%s\n' "No \`## [${VERSION}]\` section found in [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/CHANGELOG.md) for this tag. Add it before releasing." > "$TMP"
          fi
          {
            echo 'body<<CHANGELOGEOF'
            cat "$TMP"
            echo CHANGELOGEOF
          } >> "$GITHUB_OUTPUT"
          rm -f "$TMP"

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Resolve signing identity
        shell: bash
        run: |
          set -euo pipefail
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | grep 'Developer ID Application' | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ -z "$CERT_ID" ]]; then
            echo 'No Developer ID Application identity found in build.keychain' >&2
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (Developer ID Application .p12 and Apple ID).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing keys (minisign). Configure both as repo secrets;
          # the matching public key lives in src-tauri/tauri.conf.json.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Opt-in telemetry SDK keys (EU region). Build succeeds without them.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: https://eu.i.posthog.com
        with:
          projectPath: ./src-tauri
          tagName: v__VERSION__
          releaseName: 'Nesso v__VERSION__'
          releaseBody: ${{ steps.changelog.outputs.body }}
          generateReleaseNotes: false
          releaseDraft: false
          # Full release (not pre-release) so releases/latest/download/latest.json
          # — the updater endpoint — resolves to this build.
          prerelease: false
          args: '--target universal-apple-darwin'
          includeUpdaterJson: true
